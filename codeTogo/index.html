<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>M-survival: โรงเรียนนครสวรรค์</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts: Prompt -->
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;600;800&display=swap" rel="stylesheet">
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Prompt', sans-serif;
            min-height: 100vh;
            transition: background 0.5s ease;
        }
        /* Theme: Sunny */
        body.theme-sunny {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        /* Theme: Rainy */
        body.theme-rainy {
            background: linear-gradient(135deg, #4b6cb7 0%, #182848 100%);
        }

        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .survival-title {
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        /* Weather Toggle Button Transition */
        .toggle-btn {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Animation for wrong answer */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        .shake-anim {
            animation: shake 0.5s;
        }

        /* Animation for success image */
        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.9) translateY(10px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }
        .pop-in {
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="theme-sunny flex items-center justify-center p-4 md:p-8">

    <!-- Main Container (Responsive for Mobile & iPad) -->
    <div class="glass-panel w-full max-w-md md:max-w-lg lg:max-w-xl rounded-[2rem] shadow-2xl overflow-hidden relative transition-all duration-300">
        
        <!-- Decorative Elements -->
        <div id="deco1" class="absolute -top-10 -right-10 w-40 h-40 bg-purple-400 rounded-full mix-blend-multiply filter blur-xl opacity-60 animate-pulse transition-colors duration-500"></div>
        <div id="deco2" class="absolute -bottom-10 -left-10 w-40 h-40 bg-blue-400 rounded-full mix-blend-multiply filter blur-xl opacity-60 animate-pulse transition-colors duration-500" style="animation-delay: 1s;"></div>

        <div class="p-6 md:p-10 relative z-10 flex flex-col items-center">
            
            <!-- Header Section -->
            <div class="text-center mb-6">
                <span class="inline-block px-4 py-1.5 bg-indigo-100 text-indigo-700 rounded-full text-xs md:text-sm font-bold tracking-wider mb-3 shadow-sm">
                    <i class="fa-solid fa-school mr-1"></i> โรงเรียนนครสวรรค์
                </span>
                <h1 class="survival-title text-4xl md:text-5xl font-extrabold text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-600 mb-2">
                    M-survival
                </h1>
                <p class="text-gray-500 font-medium text-sm md:text-base">เลือกสภาพอากาศและกรอกรหัสเพื่อเอาชีวิตรอด</p>
            </div>

            <!-- Game Interface -->
            <div class="w-full space-y-5">
                
                <!-- Weather Toggle Section -->
                <div class="bg-gray-100/80 p-1.5 rounded-2xl flex w-full relative shadow-inner">
                    <!-- Sunny Button -->
                    <button id="btnSunny" onclick="setWeather('sunny')" 
                            class="toggle-btn flex-1 py-3 rounded-xl font-bold text-sm md:text-base flex items-center justify-center gap-2 bg-white text-orange-500 shadow-md transform scale-100">
                        <i class="fa-solid fa-sun text-lg"></i> แดดออก (ฝนไม่ตก)
                    </button>
                    <!-- Rainy Button -->
                    <button id="btnRainy" onclick="setWeather('rainy')" 
                            class="toggle-btn flex-1 py-3 rounded-xl font-bold text-sm md:text-base flex items-center justify-center gap-2 text-gray-500 bg-transparent shadow-none transform scale-95 hover:text-blue-500">
                        <i class="fa-solid fa-cloud-showers-heavy text-lg"></i> ฝนตก
                    </button>
                </div>

                <!-- Input Area -->
                <div class="relative mt-2">
                    <div class="absolute inset-y-0 left-0 pl-5 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-gray-400 text-xl"></i>
                    </div>
                    <input type="text" 
                           id="codeInput" 
                           maxlength="4" 
                           inputmode="numeric" 
                           placeholder="กรอกรหัส 4 หลัก" 
                           class="w-full pl-12 pr-4 py-4 md:py-5 bg-gray-50 border-2 border-gray-200 text-gray-800 text-3xl md:text-4xl font-bold text-center rounded-2xl focus:outline-none focus:border-indigo-500 focus:ring-4 focus:ring-indigo-100 transition-all tracking-[0.5em] placeholder:tracking-normal placeholder:text-lg placeholder:font-normal placeholder:text-gray-400"
                           onkeypress="handleKeyPress(event)">
                </div>

                <!-- Action Button -->
                <button id="submitBtn" onclick="checkCode()" 
                        class="w-full bg-gradient-to-r from-indigo-600 to-purple-600 hover:from-indigo-700 hover:to-purple-700 text-white font-bold py-4 md:py-5 px-6 rounded-2xl shadow-lg transform transition hover:-translate-y-1 hover:shadow-xl active:translate-y-0 flex items-center justify-center gap-2 text-lg md:text-xl">
                    <span>ส่งคำตอบ</span>
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>

            <!-- Result Display Area -->
            <div id="resultArea" class="w-full mt-6 hidden">
                
                <!-- Error Message Container -->
                <div id="errorContainer" class="hidden text-center p-4 bg-red-50 rounded-2xl border border-red-200 shadow-inner">
                    <i class="fa-solid fa-circle-xmark text-4xl md:text-5xl text-red-500 mb-2 block"></i>
                    <p id="errorText" class="text-red-600 font-bold text-lg md:text-xl"></p>
                </div>

                <!-- Success Image Container -->
                <div id="successContainer" class="hidden flex flex-col items-center w-full">
                    <div class="relative w-full rounded-2xl overflow-hidden shadow-xl border-4 border-white pop-in bg-gray-100">
                        
                        <!-- Status Badge -->
                        <div id="weatherBadge" class="absolute top-3 left-3 text-white text-xs md:text-sm font-bold px-3 py-1.5 rounded-full shadow-md z-10 flex items-center gap-1">
                            <!-- จะถูกเติมด้วย JS -->
                        </div>
                        <div class="absolute top-3 right-3 bg-green-500 text-white text-xs md:text-sm font-bold px-3 py-1.5 rounded-full shadow-md z-10 flex items-center gap-1">
                            <i class="fa-solid fa-check-circle"></i> รหัสถูกต้อง
                        </div>

                        <!-- Image Element -->
                        <img id="resultImage" 
                             alt="Result" 
                             class="w-full h-auto object-contain max-h-[50vh] md:max-h-[60vh] bg-white">
                        
                        <!-- Fallback Text (Will show only if image fails to load) -->
                        <div id="fallbackText" class="hidden absolute inset-0 flex flex-col items-center justify-center bg-gray-100 p-4 text-center">
                            <i class="fa-regular fa-image text-4xl text-gray-300 mb-2"></i>
                            <p class="text-sm font-bold text-gray-500">ไม่พบไฟล์รูปภาพ</p>
                            <p id="missingFileName" class="text-xs text-gray-400 mt-1 font-mono bg-gray-200 px-2 py-1 rounded"></p>
                        </div>
                    </div>
                    
                    <div class="mt-4 text-center">
                        <p class="text-indigo-700 font-bold text-xl md:text-2xl mb-1">ยินดีด้วย! คุณรอดแล้ว 🎉</p>
                        <p class="text-gray-500 text-sm">Mathematics NU x โรงเรียนนครสวรรค์</p>
                    </div>
                    
                    <!-- Reset Button -->
                    <button onclick="resetGame()" class="mt-5 px-6 py-2 bg-gray-100 text-gray-600 hover:bg-gray-200 rounded-full text-sm font-bold transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-rotate-right"></i> เล่นอีกครั้ง
                    </button>
                </div>

            </div>
        </div>

        <!-- Footer -->
        <div class="bg-gray-50/80 px-6 py-4 text-center border-t border-gray-100 backdrop-blur-sm">
            <p class="text-xs text-gray-400 font-medium">© M-survival NSSC System</p>
        </div>
    </div>

    <script>
        // ==========================================
        // ข้อมูลเกม (แก้ไขรูปภาพและรหัสได้ที่นี่)
        // ==========================================
        const validCodes = ["2859", "5438", "2857", "2417"];
        
        // รูปภาพกรณี: แดดออก (ฝนไม่ตก)
        const sunnyImages = ["sunny_pic1.png", "sunny_pic2.png", "sunny_pic3.png", "s2417.jpg"];
        
        // รูปภาพกรณี: ฝนตก
        const rainyImages = ["rainy_pic1.png", "rainy_pic2.png", "rainy_pic3.png", "r2417.JPG"];
        
        // ข้อความเมื่อตอบผิด
        const errorMessages = ["ว้ายผิด", "อาจจะยังนะ", "ลองใหม่ไหม", "ไม่ถูกจ้า", "รหัสนี้ยังไม่รอด!"];

        // ==========================================
        // ตัวแปรสถานะ
        // ==========================================
        let currentWeather = 'sunny'; // 'sunny' หรือ 'rainy'

        // Elements
        const body = document.body;
        const inputField = document.getElementById('codeInput');
        const resultArea = document.getElementById('resultArea');
        const errorContainer = document.getElementById('errorContainer');
        const successContainer = document.getElementById('successContainer');
        const errorText = document.getElementById('errorText');
        const resultImage = document.getElementById('resultImage');
        const btnSunny = document.getElementById('btnSunny');
        const btnRainy = document.getElementById('btnRainy');
        const deco1 = document.getElementById('deco1');
        const deco2 = document.getElementById('deco2');
        const submitBtn = document.getElementById('submitBtn');
        const weatherBadge = document.getElementById('weatherBadge');
        const fallbackText = document.getElementById('fallbackText');
        const missingFileName = document.getElementById('missingFileName');

        // ใช้ Event Listener จัดการภาพที่โหลดไม่สำเร็จ เพื่อป้องกัน ReferenceError
        resultImage.addEventListener('error', function() {
            if (!this.getAttribute('src')) return; // ป้องกัน error ตอนโหลดครั้งแรก
            
            this.classList.add('hidden');
            fallbackText.classList.remove('hidden');
            
            const src = this.getAttribute('src');
            const fileName = src ? src.split('/').pop() : 'unknown';
            missingFileName.textContent = fileName;
        });

        // ฟังก์ชันเปลี่ยนสภาพอากาศ
        function setWeather(weather) {
            currentWeather = weather;
            
            // รีเซ็ตเกมทุกครั้งที่เปลี่ยนสภาพอากาศ
            resetGame(false);

            if (weather === 'sunny') {
                // UI สำหรับแดดออก
                body.className = 'theme-sunny flex items-center justify-center p-4 md:p-8';
                
                btnSunny.className = "toggle-btn flex-1 py-3 rounded-xl font-bold text-sm md:text-base flex items-center justify-center gap-2 bg-white text-orange-500 shadow-md transform scale-100";
                btnRainy.className = "toggle-btn flex-1 py-3 rounded-xl font-bold text-sm md:text-base flex items-center justify-center gap-2 text-gray-500 bg-transparent shadow-none transform scale-95 hover:text-blue-500";
                
                deco1.className = "absolute -top-10 -right-10 w-40 h-40 bg-purple-400 rounded-full mix-blend-multiply filter blur-xl opacity-60 animate-pulse transition-colors duration-500";
                deco2.className = "absolute -bottom-10 -left-10 w-40 h-40 bg-pink-400 rounded-full mix-blend-multiply filter blur-xl opacity-60 animate-pulse transition-colors duration-500";
                
                submitBtn.className = "w-full bg-gradient-to-r from-orange-500 to-red-500 hover:from-orange-600 hover:to-red-600 text-white font-bold py-4 md:py-5 px-6 rounded-2xl shadow-lg transform transition hover:-translate-y-1 hover:shadow-xl active:translate-y-0 flex items-center justify-center gap-2 text-lg md:text-xl";
                
                weatherBadge.className = "absolute top-3 left-3 bg-orange-500 text-white text-xs md:text-sm font-bold px-3 py-1.5 rounded-full shadow-md z-10 flex items-center gap-1";
                weatherBadge.innerHTML = '<i class="fa-solid fa-sun"></i> แดดออก';

            } else {
                // UI สำหรับฝนตก
                body.className = 'theme-rainy flex items-center justify-center p-4 md:p-8';
                
                btnRainy.className = "toggle-btn flex-1 py-3 rounded-xl font-bold text-sm md:text-base flex items-center justify-center gap-2 bg-white text-blue-600 shadow-md transform scale-100";
                btnSunny.className = "toggle-btn flex-1 py-3 rounded-xl font-bold text-sm md:text-base flex items-center justify-center gap-2 text-gray-500 bg-transparent shadow-none transform scale-95 hover:text-orange-500";
                
                deco1.className = "absolute -top-10 -right-10 w-40 h-40 bg-blue-500 rounded-full mix-blend-multiply filter blur-xl opacity-60 animate-pulse transition-colors duration-500";
                deco2.className = "absolute -bottom-10 -left-10 w-40 h-40 bg-indigo-600 rounded-full mix-blend-multiply filter blur-xl opacity-60 animate-pulse transition-colors duration-500";
                
                submitBtn.className = "w-full bg-gradient-to-r from-blue-600 to-indigo-700 hover:from-blue-700 hover:to-indigo-800 text-white font-bold py-4 md:py-5 px-6 rounded-2xl shadow-lg transform transition hover:-translate-y-1 hover:shadow-xl active:translate-y-0 flex items-center justify-center gap-2 text-lg md:text-xl";
                
                weatherBadge.className = "absolute top-3 left-3 bg-blue-600 text-white text-xs md:text-sm font-bold px-3 py-1.5 rounded-full shadow-md z-10 flex items-center gap-1";
                weatherBadge.innerHTML = '<i class="fa-solid fa-cloud-showers-heavy"></i> ฝนตก';
            }
        }

        // ฟังก์ชันเมื่อกด Enter
        function handleKeyPress(event) {
            if (event.key === "Enter") {
                checkCode();
            }
        }

        // ตรวจสอบรหัส
        function checkCode() {
            const userCode = inputField.value.trim();

            if(userCode.length === 0) return;

            // Reset การแสดงผลเก่า
            resultArea.classList.remove('hidden');
            errorContainer.classList.add('hidden');
            successContainer.classList.add('hidden');
            inputField.classList.remove('shake-anim');
            fallbackText.classList.add('hidden');
            resultImage.classList.remove('hidden');

            // ตรวจสอบความถูกต้อง
            const index = validCodes.indexOf(userCode);

            if (index !== -1) {
                // เลือกรูปตามสภาพอากาศที่กำลังเลือกอยู่
                const imageToLoad = currentWeather === 'sunny' ? sunnyImages[index] : rainyImages[index];
                showSuccess(imageToLoad);
            } else {
                showError();
            }
        }

        function showSuccess(imageName) {
            // ตั้งค่ารูปภาพ
            resultImage.src = imageName;
            
            // แสดงผล
            successContainer.classList.remove('hidden');
            
            // ปิดคีย์บอร์ดในมือถือ
            inputField.blur();
        }

        function showError() {
            // สุ่มข้อความผิดพลาด
            const randomMsg = errorMessages[Math.floor(Math.random() * errorMessages.length)];
            errorText.textContent = randomMsg;
            
            // แสดงผล
            errorContainer.classList.remove('hidden');
            
            // เพิ่ม Animation สั่นๆ ให้ช่องกรอก
            inputField.classList.add('shake-anim');
            setTimeout(() => {
                inputField.classList.remove('shake-anim');
            }, 500);

            inputField.value = '';
            inputField.focus();
        }

        // เริ่มเกมใหม่ / รีเซ็ตฟิลด์
        function resetGame(focusInput = true) {
            inputField.value = '';
            resultArea.classList.add('hidden');
            if(focusInput) {
                inputField.focus();
            }
        }

        // Initial setup (รันเมื่อโหลดหน้าเว็บเสร็จ)
        window.onload = function() {
            setWeather('sunny');
        };
    </script>
</body>
</html>
