<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Camp: คณิตลิขิตดวง</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4a69bd;
            --secondary: #6a89cc;
            --accent: #ff6b81;
            --success: #1dd1a1;
            --warning: #feca57;
            --dark: #1e272e;
            --light: #f1f2f6;
            --bg-gradient: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Sarabun', sans-serif;
            background: var(--bg-gradient);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--dark);
            overflow-x: hidden;
            position: relative;
        }

        /* Math Symbols Background */
        .math-bg {
            position: fixed;
            top: 0; left: 0; width: 100vw; height: 100vh;
            pointer-events: none;
            z-index: -1;
            overflow: hidden;
        }
        .math-symbol {
            position: absolute;
            font-family: 'Times New Roman', serif;
            font-size: 3rem;
            color: rgba(255, 255, 255, 0.4);
            font-weight: bold;
            animation: float 20s infinite linear;
        }
        @keyframes float {
            0% { transform: translateY(110vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }

        .container {
            width: 95%;
            max-width: 900px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1), inset 0 0 0 2px rgba(255,255,255,1);
            text-align: center;
            margin: 20px 0;
        }

        /* Header */
        h1 {
            font-family: 'Chakra Petch', sans-serif;
            font-size: 3.5rem;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #4a69bd, #ff6b81);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        h2 {
            font-size: 1.8rem;
            color: var(--secondary);
            margin: 0 0 30px 0;
            font-weight: 600;
        }

        /* Mode Selector */
        .mode-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .mode-btn {
            background: #fff;
            border: 2px solid var(--secondary);
            color: var(--secondary);
            padding: 10px 25px;
            border-radius: 20px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .mode-btn.active {
            background: var(--secondary);
            color: #fff;
            box-shadow: 0 5px 15px rgba(106, 137, 204, 0.4);
        }
        .mode-btn:hover:not(.active) {
            background: rgba(106, 137, 204, 0.1);
        }

        /* Result Display Area */
        .result-area {
            background: #fff;
            border-radius: 25px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 2px dashed #dfe4ea;
        }

        .result-box {
            width: 220px;
            height: 220px;
            background: linear-gradient(135deg, #f1f2f6, #ffffff);
            border-radius: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 8rem;
            font-weight: 700;
            color: var(--primary);
            box-shadow: 10px 10px 20px rgba(0,0,0,0.05), -10px -10px 20px rgba(255,255,255,1);
            margin-bottom: 40px;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .result-box.animating {
            animation: pulse-rapid 0.1s infinite alternate;
            color: var(--accent);
        }

        .result-box.success {
            background: linear-gradient(135deg, var(--dark), #2f3640);
            color: var(--success);
            box-shadow: 0 15px 35px rgba(29, 209, 161, 0.3);
            transform: scale(1.05);
            border: 4px solid var(--success);
        }

        @keyframes pulse-rapid {
            0% { transform: scale(0.95); }
            100% { transform: scale(1.05); }
        }

        /* Controls */
        .controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            height: 60px; /* Fixed height to prevent jumping */
            align-items: center;
        }

        .btn {
            border: none;
            padding: 15px 35px;
            border-radius: 30px;
            font-family: 'Sarabun', sans-serif;
            font-size: 1.3rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
            color: white;
        }
        .btn:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.15); }
        .btn:active { transform: translateY(0); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }

        .btn-draw { background: linear-gradient(135deg, #4a69bd, #6a89cc); }
        .btn-confirm { background: linear-gradient(135deg, #1dd1a1, #10ac84); display: none; }
        .btn-redraw { background: linear-gradient(135deg, #feca57, #ff9f43); display: none; color: var(--dark);}

        /* Pool Area (Remaining Items) */
        .pool-area {
            background: #fff;
            border-radius: 25px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.03);
            text-align: left;
        }
        .pool-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #f1f2f6;
        }
        .pool-header h3 {
            margin: 0;
            font-size: 1.2rem;
            color: var(--secondary);
        }
        .pool-stats {
            font-size: 1rem;
            color: #747d8c;
            font-weight: 600;
        }

        .pool-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
        }

        .pool-item {
            background: var(--primary);
            color: white;
            padding: 10px 20px;
            border-radius: 15px;
            font-family: 'Chakra Petch', sans-serif;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 10px rgba(74, 105, 189, 0.3);
            user-select: none;
        }
        .pool-item:hover {
            transform: scale(1.05);
        }

        /* State for removed/drawn items */
        .pool-item.removed {
            background: #dfe4ea;
            color: #a4b0be;
            box-shadow: none;
            text-decoration: line-through;
            transform: scale(0.95);
        }
        .pool-item.removed:hover {
            background: #ced6e0;
            color: #747d8c;
        }

        .helper-text {
            font-size: 0.9rem;
            color: #a4b0be;
            margin-top: 15px;
            text-align: center;
        }

        @media (max-width: 600px) {
            .container { padding: 20px; border-radius: 20px;}
            h1 { font-size: 2.5rem; }
            h2 { font-size: 1.4rem; }
            .result-box { width: 160px; height: 160px; font-size: 5.5rem; }
            .btn { padding: 12px 25px; font-size: 1.1rem; }
            .pool-item { padding: 8px 15px; font-size: 1rem; }
            .controls { flex-wrap: wrap; height: auto; }
        }
    </style>
</head>
<body>

    <!-- Math Background Decor -->
    <div class="math-bg" id="mathBg"></div>

    <div class="container">
        <h1>Math Camp</h1>
        <h2>ระบบสุ่มลำดับคิว</h2>

        <div class="mode-selector">
            <button class="mode-btn active" onclick="setMode(1)" id="btn-mode1">กลุ่ม A - H</button>
            <button class="mode-btn" onclick="setMode(2)" id="btn-mode2">กลุ่มย่อย A1 - H2</button>
        </div>

        <div class="result-area">
            <div class="result-box" id="resultDisplay">?</div>
            
            <div class="controls">
                <button class="btn btn-draw" id="btnDraw" onclick="startDraw()">🎲 เริ่มสุ่ม</button>
                <button class="btn btn-confirm" id="btnConfirm" onclick="confirmDraw()">✅ ยืนยัน</button>
                <button class="btn btn-redraw" id="btnRedraw" onclick="startDraw()">🔄 สุ่มใหม่</button>
            </div>
        </div>

        <div class="pool-area">
            <div class="pool-header">
                <h3>รายการคิวทั้งหมด</h3>
                <div class="pool-stats">เหลือ: <span id="remainingCount" style="color: var(--primary);">0</span></div>
            </div>
            <div class="pool-grid" id="poolGrid">
                <!-- Items will be injected here -->
            </div>
            <div class="helper-text">
                💡 <b>ทิปส์:</b> คลิกที่ตัวเลือกด้านบนเพื่อตัดออก หรือคลิกตัวที่ตัดไปแล้วเพื่อนำกลับมาใหม่
            </div>
        </div>
    </div>

    <script>
        // --- Data Setup ---
        const basePools = {
            1: ['A', 'B', 'C', 'D', 'E', 'F', 'G', 'H'],
            2: ['A1', 'A2', 'B1', 'B2', 'C1', 'C2', 'D1', 'D2', 'E1', 'E2', 'F1', 'F2', 'G1', 'G2', 'H1', 'H2']
        };

        let currentMode = 1;
        let availableItems = []; // Array of currently available items
        let pendingItem = null;  // Item currently drawn but not confirmed
        let isAnimating = false;

        // UI Elements
        const resultDisplay = document.getElementById('resultDisplay');
        const poolGrid = document.getElementById('poolGrid');
        const remainingCount = document.getElementById('remainingCount');
        const btnDraw = document.getElementById('btnDraw');
        const btnConfirm = document.getElementById('btnConfirm');
        const btnRedraw = document.getElementById('btnRedraw');
        const btnMode1 = document.getElementById('btn-mode1');
        const btnMode2 = document.getElementById('btn-mode2');

        // --- Initialization ---
        function init() {
            createMathBackground();
            setMode(1);
        }

        function setMode(mode) {
            if(isAnimating) return; // Prevent switching during animation

            currentMode = mode;
            // Update Buttons
            btnMode1.classList.toggle('active', mode === 1);
            btnMode2.classList.toggle('active', mode === 2);

            // Reset Pool
            availableItems = [...basePools[mode]];
            resetUI();
            renderPool();
        }

        function resetUI() {
            pendingItem = null;
            resultDisplay.innerText = '?';
            resultDisplay.classList.remove('success');
            
            // Show Draw button, hide others
            btnDraw.style.display = 'flex';
            btnDraw.disabled = availableItems.length === 0;
            btnConfirm.style.display = 'none';
            btnRedraw.style.display = 'none';
        }

        // --- Render Pool ---
        function renderPool() {
            poolGrid.innerHTML = '';
            const allItems = basePools[currentMode];
            
            allItems.forEach(item => {
                const div = document.createElement('div');
                const isAvailable = availableItems.includes(item);
                
                div.className = `pool-item ${isAvailable ? '' : 'removed'}`;
                div.innerText = item;
                
                // Clicking toggles the state
                div.onclick = () => toggleItem(item);
                
                poolGrid.appendChild(div);
            });

            remainingCount.innerText = availableItems.length;
            
            // If all drawn, disable draw button
            if(btnDraw.style.display !== 'none') {
                btnDraw.disabled = availableItems.length === 0;
            }
        }

        // --- Manual Toggle Logic ---
        function toggleItem(item) {
            if(isAnimating) return; // Prevent clicking during animation

            // If an item is pending confirmation, cancel the pending state if pool is manually edited
            if(pendingItem !== null) {
                resetUI();
            }

            const index = availableItems.indexOf(item);
            if (index > -1) {
                // Currently available -> Remove it
                availableItems.splice(index, 1);
            } else {
                // Currently removed -> Add it back and sort the pool so it stays in order visually
                availableItems.push(item);
                // Sort based on original array order
                availableItems.sort((a, b) => basePools[currentMode].indexOf(a) - basePools[currentMode].indexOf(b));
            }
            renderPool();
        }

        // --- Draw Logic ---
        function startDraw() {
            if (availableItems.length === 0) return;

            isAnimating = true;
            btnDraw.style.display = 'none';
            btnConfirm.style.display = 'none';
            btnRedraw.style.display = 'none';
            
            resultDisplay.classList.add('animating');

            let counter = 0;
            const maxTicks = 20; // 2 seconds of animation
            const interval = setInterval(() => {
                // Pick a random visual item for the animation effect
                const randomIndex = Math.floor(Math.random() * availableItems.length);
                resultDisplay.innerText = availableItems[randomIndex];
                
                counter++;
                if (counter >= maxTicks) {
                    clearInterval(interval);
                    finishDraw();
                }
            }, 50);
        }

        function finishDraw() {
            isAnimating = false;
            resultDisplay.classList.remove('animating');
            
            // Pick final item
            const randomIndex = Math.floor(Math.random() * availableItems.length);
            pendingItem = availableItems[randomIndex];
            
            resultDisplay.innerText = pendingItem;
            resultDisplay.classList.add('success');

            // Show Confirm and Redraw buttons
            btnConfirm.style.display = 'flex';
            btnRedraw.style.display = 'flex';
        }

        function confirmDraw() {
            if (!pendingItem) return;

            // Remove the pending item permanently
            const index = availableItems.indexOf(pendingItem);
            if (index > -1) {
                availableItems.splice(index, 1);
            }
            
            renderPool();
            resetUI();
        }

        // --- Background Decoration ---
        function createMathBackground() {
            const bg = document.getElementById('mathBg');
            const symbols = ['∑', 'π', '∞', '√', '∫', '±', 'θ', 'µ', 'Δ', 'Ω'];
            
            for(let i = 0; i < 15; i++) {
                const el = document.createElement('div');
                el.className = 'math-symbol';
                el.innerText = symbols[Math.floor(Math.random() * symbols.length)];
                
                // Randomize position, size, and animation delay
                el.style.left = `${Math.random() * 100}vw`;
                el.style.animationDelay = `${Math.random() * 20}s`;
                el.style.fontSize = `${Math.random() * 2 + 2}rem`;
                
                bg.appendChild(el);
            }
        }

        // Run Init
        window.onload = init;

    </script>
</body>
</html>
