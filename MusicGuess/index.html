<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>คณิตศาสตร์การละคร</title>
    <!-- นำเข้า Tailwind CSS สำหรับการตกแต่งให้สวยงามเหมือนแอปพลิเคชัน -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* เพิ่ม Animation เล็กน้อยให้ดูน่าใช้งาน */
        .fade-in { animation: fadeIn 0.5s ease-in-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .spin-slow { animation: spin 10s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* ปรับแต่ง Scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1f2937; }
        ::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen font-sans selection:bg-green-500 selection:text-white flex items-center justify-center p-4">

    <!-- Container หลัก (ปรับเป็นแนวนอน Landscape) -->
    <div class="bg-gray-800 w-full max-w-5xl rounded-[2.5rem] shadow-2xl overflow-hidden border-4 border-gray-700 relative h-[600px] flex flex-col">
        
        <!-- Header -->
        <div class="pt-6 pb-4 px-8 flex justify-between items-center z-10 border-b border-gray-700">
            <h1 class="text-2xl font-bold tracking-wider text-green-400">คณิตศาสตร์<span class="text-white">การละคร</span></h1>
            <div class="text-sm font-semibold bg-gray-700 px-4 py-1.5 rounded-full" id="group-counter">กลุ่มที่ 0/8</div>
        </div>

        <!-- หน้าที่ 1: หน้าสุ่มกลุ่ม (Home Screen) -->
        <div id="screen-home" class="flex-1 flex flex-row p-8 fade-in gap-8">
            <!-- ส่วนซ้าย: ปุ่มสุ่ม -->
            <div class="flex-1 flex flex-col items-center justify-center border-r border-gray-700 pr-8">
                <div class="w-40 h-40 bg-gradient-to-br from-green-400 to-blue-600 rounded-full flex items-center justify-center mb-8 shadow-lg shadow-green-500/30">
                    <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-white"><path d="M9 18V5l12-2v13"></path><circle cx="6" cy="18" r="3"></circle><circle cx="18" cy="16" r="3"></circle></svg>
                </div>
                <h2 class="text-3xl font-bold mb-2 text-center">พร้อมหรือยัง?</h2>
                <p class="text-gray-400 text-center mb-8">สุ่มกลุ่มเพื่อทายชื่อเพลงจากการแสดง</p>
                
                <button onclick="randomizeGroup()" id="btn-random" class="w-full max-w-xs bg-green-500 hover:bg-green-400 text-black font-bold text-lg py-4 px-8 rounded-full transition-all transform hover:scale-105 shadow-xl shadow-green-500/20 flex items-center justify-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.27l-5.42 5.42"/></svg>
                    สุ่มกลุ่มถัดไป
                </button>
            </div>
            
            <!-- ส่วนขวา: ประวัติการสุ่ม -->
            <div class="flex-1 flex flex-col pl-4">
                <h3 class="text-xl font-bold mb-4 text-gray-300 flex items-center gap-2">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    ลำดับกลุ่มที่สุ่มไปแล้ว
                </h3>
                <div id="history-container" class="grid grid-cols-2 gap-3 overflow-y-auto pr-2 pb-4 h-[400px] content-start">
                    <!-- รายการประวัติจะถูกเพิ่มด้วย JavaScript -->
                    <div class="col-span-2 text-center text-gray-500 mt-10 text-sm">ยังไม่มีกลุ่มที่ถูกสุ่ม</div>
                </div>
            </div>
        </div>

        <!-- หน้าที่ 2: หน้าคำถาม (Question Screen) -->
        <div id="screen-question" class="flex-1 flex flex-row p-8 hidden fade-in gap-8">
            <!-- ส่วนซ้าย: รูปภาพและชื่อกลุ่ม -->
            <div class="flex-1 flex flex-col items-center justify-center border-r border-gray-700 pr-8">
                <h2 id="display-group-name" class="text-center text-3xl font-bold mb-6 text-gray-200">กลุ่ม A</h2>
                
                <!-- ภาพหน้าปก (Album Cover) -->
                <div class="relative w-72 h-72 mx-auto mb-4">
                    <img id="album-cover" src="" alt="Album Cover" class="w-full h-full object-cover rounded-2xl shadow-2xl shadow-black/50 border-2 border-gray-700" onerror="this.src='https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=400&auto=format&fit=crop';">
                    <!-- วงกลมตรงกลาง (แผ่นเสียง) จะโชว์ตอนเล่นเพลง -->
                    <div id="record-hole" class="hidden absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-gray-900 rounded-full border-4 border-gray-800"></div>
                </div>
            </div>

            <!-- ส่วนขวา: ตัวเลือกและผลลัพธ์ -->
            <div class="flex-1 flex flex-col justify-center pl-4 h-full">
                <div class="text-left mb-4">
                    <h3 class="text-xl font-medium text-gray-400">เพลงนี้คือเพลงอะไร?</h3>
                </div>

                <!-- ตัวเลือก 4 ข้อ -->
                <div id="choices-container" class="grid grid-cols-1 gap-3 mb-6">
                    <!-- ปุ่มจะถูกสร้างที่นี่ผ่าน JavaScript -->
                </div>

                <!-- ส่วนแสดงผลหลังตอบ (เฉลยและเครื่องเล่นเพลง) -->
                <div id="result-container" class="hidden flex-col items-center mt-auto fade-in">
                    <!-- ตัวเล่น Audio ที่ซ่อนอยู่ เราจะควบคุมผ่าน JS -->
                    <audio id="audio-player" src=""></audio>
                    
                    <div class="w-full bg-gray-700/50 rounded-xl p-4 mb-4 flex items-center justify-between">
                        <div>
                            <p class="text-sm text-green-400 font-bold mb-1" id="result-status">คำตอบที่ถูกต้อง!</p>
                            <p class="font-bold text-xl text-white truncate w-56" id="correct-song-name">ชื่อเพลง</p>
                        </div>
                        <!-- Animation กราฟเสียง (โชว์ตอนเล่น) -->
                        <div class="flex items-end gap-1.5 h-8">
                            <div class="w-2 bg-green-500 rounded-t h-3 animate-[bounce_1s_infinite]"></div>
                            <div class="w-2 bg-green-500 rounded-t h-6 animate-[bounce_1.2s_infinite]"></div>
                            <div class="w-2 bg-green-500 rounded-t h-8 animate-[bounce_0.8s_infinite]"></div>
                            <div class="w-2 bg-green-500 rounded-t h-4 animate-[bounce_1.1s_infinite]"></div>
                        </div>
                    </div>

                    <button onclick="goToHome()" class="w-full bg-white text-black hover:bg-gray-200 font-bold py-4 rounded-full transition-colors flex justify-center items-center gap-2 shadow-lg text-lg">
                        กลับไปสุ่มกลุ่มถัดไป
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
                    </button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ==========================================
        // ส่วนการตั้งค่าข้อมูล (แก้ไขข้อมูลเพลงและรูปได้ที่นี่)
        // ==========================================
        // 1. image: ระบุชื่อไฟล์รูปภาพที่อยู่ในโฟลเดอร์เดียวกับเว็บ เช่น 'group_a.jpg'
        // 2. audioUrl: ระบุลิงก์ไฟล์เสียง (.mp3, .wav) หากไม่มีให้ปล่อยว่าง หรือใช้ลิงก์ตัวอย่าง
        // ==========================================
        const allGroupsData = [
            {
                id: 'A',
                name: 'กลุ่ม A',
                image: 'group_a.jpg', 
                correctSong: 'นะหน้าทอง - Joey Phuwasit',
                choices: ['นะหน้าทอง - Joey Phuwasit', 'ซ่อนกลิ่น - Palmy', 'เลือดกรุ๊ปบี - Chokun', 'ทรงอย่างแบด - Paper Planes'],
                audioUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3' // ลิงก์ตัวอย่าง
            },
            {
                id: 'B',
                name: 'กลุ่ม B',
                image: 'group_b.jpg',
                correctSong: 'ทรงอย่างแบด - Paper Planes',
                choices: ['เสแสร้ง - Paper Planes', 'ทรงอย่างแบด - Paper Planes', 'วัดปะหล่ะ? - 4EVE', 'พี่ชอบหนูที่สุดเลย - PONCHET'],
                audioUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-2.mp3'
            },
            {
                id: 'C',
                name: 'กลุ่ม C',
                image: 'group_c.jpg',
                correctSong: 'เลือดกรุ๊ปบี - Bood Group',
                choices: ['โต๊ะริม - NONT TANONT', 'เลือดกรุ๊ปบี - Bood Group', 'พิง - NONT TANONT', 'สลักจิต - ป๊อบ ปองกูล'],
                audioUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-3.mp3'
            },
            {
                id: 'D',
                name: 'กลุ่ม D',
                image: 'group_d.jpg',
                correctSong: 'Stand by หล่อ - New Country',
                choices: ['Stand by หล่อ - New Country', 'ฉลามชอบงับคุณ - Bonnadol', 'ถ้าเราเจอกันอีก - Tilly Birds', 'ลืมแทบไม่ลง - SARAN'],
                audioUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-4.mp3'
            },
            {
                id: 'E',
                name: 'กลุ่ม E',
                image: 'group_e.jpg',
                correctSong: 'วัดปะหล่ะ? - 4EVE',
                choices: ['ข้อยกเว้น - 4EVE', 'วัดปะหล่ะ? - 4EVE', 'รักนะต้าววาฬ - นุ๊ก ธนดล', 'ทน - SPRITE x GUYGEEGEE'],
                audioUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-5.mp3'
            },
            {
                id: 'F',
                name: 'กลุ่ม F',
                image: 'group_f.jpg',
                correctSong: 'พี่ชอบหนูที่สุดเลย - PONCHET',
                choices: ['พี่ชอบหนูที่สุดเลย - PONCHET', 'พิจารณา - Musketeers', 'วาดไว้ - BOWKYLION', 'รักแท้ - NuNew'],
                audioUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-6.mp3'
            },
            {
                id: 'G',
                name: 'กลุ่ม G',
                image: 'group_g.jpg',
                correctSong: 'โต๊ะริม - NONT TANONT',
                choices: ['พิง - NONT TANONT', 'ทุกนาทีที่สวยงาม - NONT TANONT', 'โต๊ะริม - NONT TANONT', 'วันเกิดฉันปีนี้ - Three Man Down'],
                audioUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-7.mp3'
            },
            {
                id: 'H',
                name: 'กลุ่ม H',
                image: 'group_h.jpg',
                correctSong: 'สลักจิต - ป๊อบ ปองกูล',
                choices: ['ภาพจำ - ป๊อบ ปองกูล', 'สลักจิต - ป๊อบ ปองกูล', 'ปล่อย - ป๊อบ ปองกูล', 'Undo - ป๊อบ ปองกูล'],
                audioUrl: 'https://www.soundhelix.com/examples/mp3/SoundHelix-Song-8.mp3'
            }
        ];

        // ==========================================
        // ส่วนควบคุมลอจิกของระบบ
        // ==========================================
        let availableGroups = [...allGroupsData]; // คัดลอกข้อมูลมาเพื่อสุ่มและตัดออก
        let playedHistory = []; // เก็บประวัติกลุ่มที่เล่นไปแล้ว
        let currentGroup = null;
        let playedCount = 0;
        let totalGroups = allGroupsData.length;

        // ดึง Element จาก DOM
        const screenHome = document.getElementById('screen-home');
        const screenQuestion = document.getElementById('screen-question');
        const displayGroupName = document.getElementById('display-group-name');
        const albumCover = document.getElementById('album-cover');
        const recordHole = document.getElementById('record-hole');
        const choicesContainer = document.getElementById('choices-container');
        const resultContainer = document.getElementById('result-container');
        const audioPlayer = document.getElementById('audio-player');
        const correctSongName = document.getElementById('correct-song-name');
        const resultStatus = document.getElementById('result-status');
        const groupCounter = document.getElementById('group-counter');
        const btnRandom = document.getElementById('btn-random');
        const historyContainer = document.getElementById('history-container');

        // ฟังก์ชันอัปเดตประวัติในหน้าแรก
        function updateHistoryUI() {
            if (playedHistory.length === 0) {
                historyContainer.innerHTML = '<div class="col-span-2 text-center text-gray-500 mt-10 text-sm">ยังไม่มีกลุ่มที่ถูกสุ่ม</div>';
                return;
            }
            
            historyContainer.innerHTML = '';
            playedHistory.forEach((group, index) => {
                const historyItem = document.createElement('div');
                historyItem.className = "bg-gray-700/50 p-3 rounded-xl flex items-center gap-3 border border-gray-600 fade-in";
                historyItem.innerHTML = `
                    <div class="w-10 h-10 rounded-full bg-gray-600 flex-shrink-0 overflow-hidden border border-gray-500">
                        <img src="${group.image}" onerror="this.src='https://images.unsplash.com/photo-1614613535308-eb5fbd3d2c17?q=80&w=100&auto=format&fit=crop';" class="w-full h-full object-cover">
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-xs text-gray-400 font-semibold mb-0.5">ลำดับที่ ${index + 1}</p>
                        <p class="text-sm font-bold text-white truncate">${group.name}</p>
                    </div>
                `;
                historyContainer.appendChild(historyItem);
            });
        }

        // ฟังก์ชันสลับตำแหน่งใน Array (Fisher-Yates Shuffle)
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // ฟังก์ชันเริ่มสุ่มกลุ่ม
        function randomizeGroup() {
            if (availableGroups.length === 0) {
                // เล่นครบแล้ว
                btnRandom.innerHTML = "เล่นครบทุกกลุ่มแล้ว! (คลิกเพื่อเริ่มใหม่)";
                btnRandom.onclick = resetGame;
                btnRandom.classList.replace('bg-green-500', 'bg-blue-500');
                btnRandom.classList.replace('hover:bg-green-400', 'hover:bg-blue-400');
                return;
            }

            // สุ่ม Index
            const randomIndex = Math.floor(Math.random() * availableGroups.length);
            currentGroup = availableGroups[randomIndex];
            
            // เพิ่มลงในประวัติ
            playedHistory.push(currentGroup);
            
            // ลบกลุ่มที่สุ่มได้ออกจาก Array จะได้ไม่ซ้ำ
            availableGroups.splice(randomIndex, 1);
            
            playedCount++;
            groupCounter.innerText = `กลุ่มที่ ${playedCount}/${totalGroups}`;

            showQuestionScreen();
        }

        // ฟังก์ชันแสดงหน้าคำถาม
        function showQuestionScreen() {
            // ซ่อนหน้าแรก โชว์หน้าคำถาม
            screenHome.classList.add('hidden');
            screenQuestion.classList.remove('hidden');
            resultContainer.classList.add('hidden');
            
            // รีเซ็ตอนิเมชั่น
            albumCover.classList.remove('rounded-full', 'spin-slow');
            recordHole.classList.add('hidden');

            // ใส่ข้อมูล
            displayGroupName.innerText = `กำลังแสดง: ${currentGroup.name}`;
            albumCover.src = currentGroup.image;

            // สร้างปุ่มตัวเลือก
            choicesContainer.innerHTML = '';
            let shuffledChoices = shuffleArray([...currentGroup.choices]); // สลับข้อ
            
            shuffledChoices.forEach(choice => {
                const button = document.createElement('button');
                button.innerText = choice;
                button.className = "choice-btn w-full bg-gray-700 hover:bg-gray-600 text-left px-5 py-4 rounded-xl text-sm font-medium transition-all border border-transparent focus:outline-none";
                button.onclick = () => handleAnswer(choice, button);
                choicesContainer.appendChild(button);
            });
        }

        // ฟังก์ชันตรวจคำตอบ
        function handleAnswer(selectedChoice, selectedButton) {
            // ปิดการกดปุ่มทั้งหมด
            const buttons = document.querySelectorAll('.choice-btn');
            buttons.forEach(btn => btn.disabled = true);

            const isCorrect = (selectedChoice === currentGroup.correctSong);

            // เปลี่ยนสีปุ่ม
            buttons.forEach(btn => {
                if (btn.innerText === currentGroup.correctSong) {
                    // ไฮไลท์ข้อถูกเป็นสีเขียว
                    btn.classList.replace('bg-gray-700', 'bg-green-500/20');
                    btn.classList.replace('hover:bg-gray-600', 'bg-green-500/20');
                    btn.classList.add('border-green-500', 'text-green-400');
                } else if (btn === selectedButton && !isCorrect) {
                    // ไฮไลท์ข้อผิดเป็นสีแดง
                    btn.classList.replace('bg-gray-700', 'bg-red-500/20');
                    btn.classList.replace('hover:bg-gray-600', 'bg-red-500/20');
                    btn.classList.add('border-red-500', 'text-red-400');
                } else {
                    // ปุ่มอื่นลดความสว่างลง
                    btn.classList.add('opacity-40');
                }
            });

            // ตั้งค่าข้อความผลลัพธ์
            if (isCorrect) {
                resultStatus.innerText = "🎉 ทายถูกต้อง!";
                resultStatus.className = "text-xs font-bold mb-1 text-green-400";
            } else {
                resultStatus.innerText = "❌ ทายผิด!";
                resultStatus.className = "text-xs font-bold mb-1 text-red-400";
            }

            // แสดงหน้าเฉลยและเล่นเพลง
            showResult();
        }

        // ฟังก์ชันแสดงผลและเล่นเพลง
        function showResult() {
            correctSongName.innerText = currentGroup.correctSong;
            resultContainer.classList.remove('hidden');

            // เปลี่ยนรูปภาพให้ดูเหมือนแผ่นเสียงกำลังหมุน
            albumCover.classList.add('rounded-full', 'spin-slow');
            recordHole.classList.remove('hidden');

            // เล่นเพลง
            if(currentGroup.audioUrl) {
                audioPlayer.src = currentGroup.audioUrl;
                audioPlayer.play().catch(e => console.log("Audio play blocked by browser. User interaction needed."));
            }
        }

        // ฟังก์ชันกลับไปหน้าหลัก
        function goToHome() {
            // หยุดเพลง
            audioPlayer.pause();
            audioPlayer.currentTime = 0;

            // อัปเดต UI ประวัติ
            updateHistoryUI();

            // สลับหน้าจอ
            screenQuestion.classList.add('hidden');
            screenHome.classList.remove('hidden');
        }

        // ฟังก์ชันเริ่มเกมใหม่ทั้งหมด
        function resetGame() {
            availableGroups = [...allGroupsData];
            playedHistory = [];
            playedCount = 0;
            groupCounter.innerText = `กลุ่มที่ 0/${totalGroups}`;
            updateHistoryUI();
            
            btnRandom.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.59-9.27l-5.42 5.42"/></svg>
                สุ่มกลุ่มถัดไป
            `;
            btnRandom.onclick = randomizeGroup;
            btnRandom.classList.replace('bg-blue-500', 'bg-green-500');
            btnRandom.classList.replace('hover:bg-blue-400', 'hover:bg-green-400');
        }

    </script>
</body>
</html>
