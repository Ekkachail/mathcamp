<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบวิเคราะห์เครือข่ายการลงทะเบียนเรียน</title>
    
    <!-- Google Fonts: Kanit -->
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Kanit', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM (UMD) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (สำหรับการแปลง JSX ใน Browser) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- PapaParse สำหรับดึงและอ่านไฟล์ CSV จาก Google Sheet -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <!-- Vis-Network -->
    <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>

    <style>
        body { font-family: 'Kanit', sans-serif; }
    </style>

    <!-- แก้ไขข้อผิดพลาด ResizeObserver (ไม่มีผลกระทบกับการทำงานหลัก แต่ช่วยลด Error ใน Console) -->
    <script>
        window.addEventListener('error', function(e) {
            if (e.message === 'ResizeObserver loop limit exceeded' || e.message === 'ResizeObserver loop completed with undelivered notifications.') {
                e.stopImmediatePropagation();
            }
        });
    </script>
</head>
<body class="bg-slate-50 text-slate-800">
    <!-- จุดที่ React จะนำ UI มาแสดง -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- ไอคอนแบบ SVG ---
        const SearchIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;
        const NetworkIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="16" y="16" width="6" height="6" rx="1"></rect><rect x="2" y="16" width="6" height="6" rx="1"></rect><rect x="9" y="2" width="6" height="6" rx="1"></rect><path d="M5 16v-3a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v3"></path><path d="M12 12V8"></path></svg>;
        const UsersIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M22 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>;
        const BookOpenIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>;
        const FilterIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"></polygon></svg>;
        const ClipboardListIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="8" y="2" width="8" height="4" rx="1" ry="1"></rect><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"></path><path d="M12 11h4"></path><path d="M12 16h4"></path><path d="M8 11h.01"></path><path d="M8 16h.01"></path></svg>;
        const MaximizeIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3"></path><path d="M21 8V5a2 2 0 0 0-2-2h-3"></path><path d="M3 16v3a2 2 0 0 0 2 2h3"></path><path d="M16 21h3a2 2 0 0 0 2-2v-3"></path></svg>;
        const MinimizeIcon = ({ className }) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M8 3v3a2 2 0 0 1-2 2H3"></path><path d="M21 8h-3a2 2 0 0 1-2-2V3"></path><path d="M3 16h3a2 2 0 0 1 2 2v3"></path><path d="M16 21v-3a2 2 0 0 1 2-2h3"></path></svg>;

        // ==========================================
        // ตั้งค่า URL ของ Google Sheet (ต้องเผยแพร่เป็น CSV)
        // ==========================================
        const GOOGLE_SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vR2n3uMndnk1NQElScgt0WyRP1zjNeq3SndNTqU8IhElP3M3G5sUWT-hZZkzIxojfLgHjSkPjkKlPLK/pub?gid=0&single=true&output=csv';
        
        // --- ข้อมูลจำลอง (Mock Data) ใช้ในกรณีที่ยังไม่มีลิงก์หรือโหลดไม่สำเร็จ ---
        const MOCK_DATA = [
            { courseCode: '252111', courseName: 'แคลคูลัส 1', major: 'คณิตศาสตร์', student: '66310325 กัญญาณี แช่มเดช', semester: 'ต้น' },
            { courseCode: '252111', courseName: 'แคลคูลัส 1', major: 'คณิตศาสตร์', student: '66310929 จุฑาภรณ์ วิวัฒน์ยุวะถาวร', semester: 'ต้น' },
            { courseCode: '252111', courseName: 'แคลคูลัส 1', major: 'วิทยาการคอมพิวเตอร์', student: '66510002 สมหญิง รักเรียน', semester: 'ต้น' },
            { courseCode: '252111', courseName: 'แคลคูลัส 1', major: 'สถิติ', student: '66410001 สมชาย ใจดี', semester: 'ต้น' },
            { courseCode: '252281', courseName: 'คณิตศาสตร์การเงินเบื้องต้น', major: 'คณิตศาสตร์', student: '66310325 กัญญาณี แช่มเดช', semester: 'ต้น' },
            { courseCode: '252281', courseName: 'คณิตศาสตร์การเงินเบื้องต้น', major: 'คณิตศาสตร์', student: '66310929 จุฑาภรณ์ วิวัฒน์ยุวะถาวร', semester: 'ต้น' },
            { courseCode: '252281', courseName: 'คณิตศาสตร์การเงินเบื้องต้น', major: 'คณิตศาสตร์', student: '66311315 ญาณิศา ว่องไว', semester: 'ต้น' },
            { courseCode: '252281', courseName: 'คณิตศาสตร์การเงินเบื้องต้น', major: 'สถิติ', student: '66410001 สมชาย ใจดี', semester: 'ต้น' },
            { courseCode: '252282', courseName: 'สถิติเบื้องต้น', major: 'คณิตศาสตร์', student: '66310325 กัญญาณี แช่มเดช', semester: 'ต้น' },
            { courseCode: '252282', courseName: 'สถิติเบื้องต้น', major: 'คณิตศาสตร์', student: '66311315 ญาณิศา ว่องไว', semester: 'ต้น' },
            { courseCode: '252282', courseName: 'สถิติเบื้องต้น', major: 'วิทยาการคอมพิวเตอร์', student: '66510002 สมหญิง รักเรียน', semester: 'ต้น' },
            { courseCode: '254101', courseName: 'การเขียนโปรแกรม 1', major: 'วิทยาการคอมพิวเตอร์', student: '66510002 สมหญิง รักเรียน', semester: 'ต้น' },
            { courseCode: '254101', courseName: 'การเขียนโปรแกรม 1', major: 'สถิติ', student: '66410001 สมชาย ใจดี', semester: 'ต้น' },
            { courseCode: '254101', courseName: 'การเขียนโปรแกรม 1', major: 'คณิตศาสตร์', student: '66310325 กัญญาณี แช่มเดช', semester: 'ต้น' },
            { courseCode: '252283', courseName: 'แคลคูลัส 2', major: 'คณิตศาสตร์', student: '66310325 กัญญาณี แช่มเดช', semester: 'ปลาย' },
            { courseCode: '254102', courseName: 'การเขียนโปรแกรม 2', major: 'วิทยาการคอมพิวเตอร์', student: '66510002 สมหญิง รักเรียน', semester: 'ปลาย' },
            { courseCode: '254102', courseName: 'การเขียนโปรแกรม 2', major: 'คณิตศาสตร์', student: '66310325 กัญญาณี แช่มเดช', semester: 'ปลาย' },
        ];

        function App() {
            const [activeTab, setActiveTab] = useState('search');
            
            const [data, setData] = useState([]); // เริ่มต้นเป็น Array ว่าง
            const [isLoading, setIsLoading] = useState(true); // สถานะการโหลดข้อมูลจาก Google Sheet
            const [visLoaded, setVisLoaded] = useState(false);

            // States สำหรับการค้นหาและฟิลเตอร์
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedSemester, setSelectedSemester] = useState('ต้น');
            const [excludedMajors, setExcludedMajors] = useState([]);
            const [selectedCourseForList, setSelectedCourseForList] = useState('all');
            const [excludedGraphCourses, setExcludedGraphCourses] = useState([]);
            
            // States สำหรับโหมดเต็มจอ
            const [isFullscreen, setIsFullscreen] = useState(false);

            // States สำหรับพิมพ์เพื่อตัด/เพิ่มรายวิชา (Autocomplete)
            const [excludeInput, setExcludeInput] = useState('');
            const [includeInput, setIncludeInput] = useState('');
            const [excludeSuggestions, setExcludeSuggestions] = useState([]);
            const [includeSuggestions, setIncludeSuggestions] = useState([]);

            const graphRef = useRef(null);
            const networkRef = useRef(null);

            // โหลดข้อมูลจาก Google Sheet เมื่อเปิดหน้าเว็บ
            useEffect(() => {
                if (GOOGLE_SHEET_CSV_URL && GOOGLE_SHEET_CSV_URL.startsWith('http')) {
                    window.Papa.parse(GOOGLE_SHEET_CSV_URL, {
                        download: true,
                        header: true,
                        skipEmptyLines: true,
                        complete: (results) => {
                            // แปลงชื่อคอลัมน์จากภาษาไทยใน Sheet ให้เข้ากับระบบ
                            const parsedData = results.data.map(row => ({
                                courseCode: row.courseCode || row['รหัสวิชา'] || '',
                                courseName: row.courseName || row['ชื่อวิชา'] || '',
                                major: row.major || row['สาขา'] || '',
                                student: row.student || row['รหัสนิสิต'] || row['ชื่อ-สกุล'] || row['รหัสนิสิต - ชื่อ'] || '',
                                semester: row.semester || row['ภาคเรียน'] || 'ต้น'
                            })).filter(item => item.courseCode && item.student); // ตัดบรรทัดที่ว่างทิ้ง

                            if (parsedData.length > 0) {
                                setData(parsedData);
                            } else {
                                setData(MOCK_DATA);
                            }
                            setIsLoading(false);
                        },
                        error: (err) => {
                            console.error('โหลด Google Sheet ไม่สำเร็จ, ใช้ Mock Data แทน', err);
                            setData(MOCK_DATA);
                            setIsLoading(false);
                        }
                    });
                } else {
                    // หากยังไม่ได้ใส่ลิงก์ ให้ใช้ Mock Data
                    setData(MOCK_DATA);
                    setIsLoading(false);
                }
            }, []);

            useEffect(() => {
                if (window.vis) {
                    setVisLoaded(true);
                }
            }, []);

            // Handle Fullscreen resize for Vis-Network
            useEffect(() => {
                if (networkRef.current) {
                    setTimeout(() => {
                        networkRef.current.fit();
                    }, 50);
                }
            }, [isFullscreen]);

            const uniqueMajors = useMemo(() => [...new Set(data.map(d => d.major))], [data]);
            const uniqueSemesters = useMemo(() => [...new Set(data.map(d => d.semester))], [data]);

            const uniqueCourses = useMemo(() => {
                const map = new Map();
                data.forEach(d => {
                if (!map.has(d.courseCode)) {
                    map.set(d.courseCode, d.courseName);
                }
                });
                return Array.from(map.entries()).map(([code, name]) => ({ code, name })).sort((a, b) => a.code.localeCompare(b.code));
            }, [data]);

            const toggleMajorExclusion = (major) => {
                setExcludedMajors(prev => 
                prev.includes(major) ? prev.filter(m => m !== major) : [...prev, major]
                );
            };

            const toggleCourseExclusion = (courseCode) => {
                setExcludedGraphCourses(prev => 
                prev.includes(courseCode) ? prev.filter(c => c !== courseCode) : [...prev, courseCode]
                );
            };

            const graphAvailableCoursesList = useMemo(() => {
                const filteredData = data.filter(item => 
                item.semester === selectedSemester && !excludedMajors.includes(item.major)
                );
                const map = new Map();
                filteredData.forEach(d => {
                if (!map.has(d.courseCode)) {
                    map.set(d.courseCode, d.courseName);
                }
                });
                return Array.from(map.entries()).map(([code, name]) => ({ code, name })).sort((a, b) => a.code.localeCompare(b.code));
            }, [data, selectedSemester, excludedMajors]);

            // ---- Autocomplete Handlers ----
            const handleExcludeInputChange = (e) => {
                const val = e.target.value;
                setExcludeInput(val);
                if (val.trim()) {
                    // แนะนำวิชาที่ "ยังไม่ได้ตัดออก"
                    const matches = graphAvailableCoursesList.filter(c => 
                        !excludedGraphCourses.includes(c.code) && 
                        (c.code.includes(val) || c.name.toLowerCase().includes(val.toLowerCase()))
                    );
                    setExcludeSuggestions(matches);
                } else {
                    setExcludeSuggestions([]);
                }
            };

            const handleIncludeInputChange = (e) => {
                const val = e.target.value;
                setIncludeInput(val);
                if (val.trim()) {
                    // แนะนำวิชาที่ "ถูกตัดออกไปแล้ว"
                    const matches = graphAvailableCoursesList.filter(c => 
                        excludedGraphCourses.includes(c.code) && 
                        (c.code.includes(val) || c.name.toLowerCase().includes(val.toLowerCase()))
                    );
                    setIncludeSuggestions(matches);
                } else {
                    setIncludeSuggestions([]);
                }
            };

            const confirmExcludeCourse = (courseCode) => {
                if (!excludedGraphCourses.includes(courseCode)) {
                    setExcludedGraphCourses(prev => [...prev, courseCode]);
                }
                setExcludeInput('');
                setExcludeSuggestions([]);
            };

            const confirmIncludeCourse = (courseCode) => {
                setExcludedGraphCourses(prev => prev.filter(c => c !== courseCode));
                setIncludeInput('');
                setIncludeSuggestions([]);
            };
            // --------------------------------

            // Logic 1: ค้นหานิสิต
            const searchResults = useMemo(() => {
                if (!searchQuery.trim()) return [];
                return data.filter(item => 
                item.student.toLowerCase().includes(searchQuery.toLowerCase()) ||
                item.courseCode.includes(searchQuery) ||
                item.courseName.toLowerCase().includes(searchQuery.toLowerCase())
                );
            }, [data, searchQuery]);

            // Logic 2: กราฟความสัมพันธ์
            const graphData = useMemo(() => {
                const filteredData = data.filter(item => 
                item.semester === selectedSemester && 
                !excludedMajors.includes(item.major) &&
                !excludedGraphCourses.includes(item.courseCode)
                );

                const studentMap = {};
                const courseDetailsMap = {};

                filteredData.forEach(item => {
                if (!studentMap[item.student]) {
                    studentMap[item.student] = { courses: [], major: item.major };
                }
                if (!studentMap[item.student].courses.includes(item.courseCode)) {
                    studentMap[item.student].courses.push(item.courseCode);
                }
                courseDetailsMap[item.courseCode] = item.courseName;
                });

                const edgesCount = {};
                
                Object.values(studentMap).forEach(({ courses, major }) => {
                if (courses.length < 2) return;
                
                for (let i = 0; i < courses.length; i++) {
                    for (let j = i + 1; j < courses.length; j++) {
                    const pair = [courses[i], courses[j]].sort();
                    const edgeKey = `${pair[0]}|${pair[1]}|${major}`;
                    edgesCount[edgeKey] = (edgesCount[edgeKey] || 0) + 1;
                    }
                }
                });

                const nodes = Object.keys(courseDetailsMap).map(code => ({
                id: code,
                label: `${code}\n${courseDetailsMap[code]}`,
                title: courseDetailsMap[code],
                shape: 'box',
                color: { background: '#e0f2fe', border: '#0284c7' },
                font: { face: 'Kanit, sans-serif' }
                }));

                const MAJOR_COLORS = { 'คณิตศาสตร์': '#ef4444', 'สถิติ': '#ec4899', 'วิทยาการคอมพิวเตอร์': '#10b981' };

                const edges = Object.keys(edgesCount).map(key => {
                const [from, to, major] = key.split('|');
                const weight = edgesCount[key];
                const edgeColor = MAJOR_COLORS[major] || '#94a3b8';

                return {
                    id: key,
                    from, to,
                    label: weight.toString(),
                    value: weight,
                    title: `สาขา ${major}: นิสิตลงเรียนคู่นี้ ${weight} คน`,
                    font: { align: 'top', strokeWidth: 3, strokeColor: '#ffffff', color: edgeColor },
                    color: { color: edgeColor, highlight: edgeColor, hover: edgeColor }
                };
                });

                return { nodes, edges };
            }, [data, selectedSemester, excludedMajors, excludedGraphCourses]);

            // Logic 3: รายชื่อนิสิต
            const courseListDisplayData = useMemo(() => {
                let filtered = data;
                if (selectedCourseForList !== 'all') {
                filtered = data.filter(d => d.courseCode === selectedCourseForList);
                }

                const grouped = {};
                filtered.forEach(item => {
                if (!grouped[item.courseCode]) {
                    grouped[item.courseCode] = { courseCode: item.courseCode, courseName: item.courseName, students: [] };
                }
                grouped[item.courseCode].students.push(item);
                });

                Object.values(grouped).forEach(group => {
                group.students.sort((a, b) => a.major.localeCompare(b.major, 'th'));
                });

                return Object.values(grouped).sort((a, b) => a.courseCode.localeCompare(b.courseCode));
            }, [data, selectedCourseForList]);

            useEffect(() => {
                if (activeTab === 'graph' && visLoaded && graphRef.current) {
                if (networkRef.current) { networkRef.current.destroy(); }
                const options = {
                    physics: { barnesHut: { gravitationalConstant: -3000, springLength: 200 }, stabilization: { iterations: 150 } },
                    edges: { smooth: { type: 'dynamic' } },
                    interaction: { hover: true, tooltipDelay: 200 }
                };
                networkRef.current = new window.vis.Network(graphRef.current, graphData, options);
                }
            }, [activeTab, visLoaded, graphData]);

            if (isLoading) {
                return (
                    <div className="min-h-screen bg-slate-50 flex flex-col items-center justify-center font-sans">
                        <div className="w-12 h-12 border-4 border-indigo-200 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
                        <p className="text-slate-600 font-medium">กำลังโหลดข้อมูลจาก Google Sheet...</p>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800">
                <header className="bg-indigo-600 text-white shadow-md">
                    <div className="max-w-6xl mx-auto px-4 py-6">
                    <h1 className="text-2xl font-bold flex items-center gap-2">
                        <NetworkIcon className="w-8 h-8" />
                        ระบบวิเคราะห์เครือข่ายการลงทะเบียนเรียน
                    </h1>
                    <p className="text-indigo-200 mt-1">วิเคราะห์ความสัมพันธ์รายวิชาและค้นหาข้อมูลนิสิต</p>
                    </div>
                </header>

                <main className="max-w-6xl mx-auto px-4 py-8">
                    <div className="flex space-x-1 bg-white p-1 rounded-xl shadow-sm mb-6 w-fit border border-slate-200">
                    <button onClick={() => setActiveTab('search')} className={`flex items-center gap-2 px-6 py-2.5 rounded-lg font-medium transition-colors ${activeTab === 'search' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-50'}`}>
                        <SearchIcon className="w-4 h-4" /> ค้นหาข้อมูลนิสิต
                    </button>
                    <button onClick={() => setActiveTab('course-list')} className={`flex items-center gap-2 px-6 py-2.5 rounded-lg font-medium transition-colors ${activeTab === 'course-list' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-50'}`}>
                        <ClipboardListIcon className="w-4 h-4" /> รายชื่อนิสิตตามรายวิชา
                    </button>
                    <button onClick={() => setActiveTab('graph')} className={`flex items-center gap-2 px-6 py-2.5 rounded-lg font-medium transition-colors ${activeTab === 'graph' ? 'bg-indigo-50 text-indigo-700' : 'text-slate-600 hover:bg-slate-50'}`}>
                        <NetworkIcon className="w-4 h-4" /> วิเคราะห์กราฟความสัมพันธ์
                    </button>
                    </div>

                    {activeTab === 'search' && (
                        // ส่วนค้นหา
                        <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                            <div className="p-6 border-b border-slate-200 bg-slate-50/50">
                            <h2 className="text-lg font-semibold flex items-center gap-2 mb-4">
                                <UsersIcon className="w-5 h-5 text-indigo-600" /> ตรวจสอบวิชาเรียนของนิสิต
                            </h2>
                            <div className="relative max-w-xl">
                                <SearchIcon className="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400" />
                                <input type="text" placeholder="พิมพ์ รหัสนิสิต, ชื่อ-สกุล หรือ รหัสวิชา เพื่อค้นหา..." value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-300 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent transition-all" />
                            </div>
                            </div>
                            <div className="p-0 overflow-x-auto">
                            {searchQuery ? (
                                searchResults.length > 0 ? (
                                <table className="w-full text-left border-collapse">
                                    <thead>
                                    <tr className="bg-slate-100 text-slate-600 text-sm">
                                        <th className="p-4 border-b">รหัสนิสิต - ชื่อ</th>
                                        <th className="p-4 border-b">สาขา</th>
                                        <th className="p-4 border-b">รหัสวิชา</th>
                                        <th className="p-4 border-b">ชื่อวิชา</th>
                                        <th className="p-4 border-b">ภาคเรียน</th>
                                    </tr>
                                    </thead>
                                    <tbody>
                                    {searchResults.map((item, idx) => (
                                        <tr key={idx} className="border-b last:border-0 hover:bg-slate-50">
                                        <td className="p-4 font-medium text-indigo-700">{item.student}</td>
                                        <td className="p-4"><span className="px-2.5 py-1 bg-slate-100 text-slate-700 rounded-full text-sm">{item.major}</span></td>
                                        <td className="p-4">{item.courseCode}</td>
                                        <td className="p-4">{item.courseName}</td>
                                        <td className="p-4">{item.semester}</td>
                                        </tr>
                                    ))}
                                    </tbody>
                                </table>
                                ) : (
                                <div className="p-12 text-center text-slate-500">
                                    <SearchIcon className="w-12 h-12 mx-auto mb-3 text-slate-300" />
                                    <p>ไม่พบข้อมูลที่ตรงกับการค้นหา</p>
                                </div>
                                )
                            ) : (
                                <div className="p-12 text-center text-slate-500">
                                <BookOpenIcon className="w-12 h-12 mx-auto mb-3 text-slate-300" />
                                <p>พิมพ์คำค้นหาในช่องด้านบนเพื่อดูข้อมูลการลงทะเบียน</p>
                                </div>
                            )}
                            </div>
                        </div>
                    )}

                    {activeTab === 'course-list' && (
                        // ส่วนรายชื่อตามรายวิชา
                        <div className="space-y-6">
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                            <div className="flex flex-col md:flex-row md:items-center gap-4 justify-between">
                                <h2 className="text-lg font-semibold flex items-center gap-2 text-slate-800">
                                <ClipboardListIcon className="w-5 h-5 text-indigo-600" /> แสดงรายชื่อนิสิตแบ่งตามรายวิชา
                                </h2>
                                <div className="w-full md:w-1/3">
                                <label className="block text-sm font-medium text-slate-700 mb-1">เลือกรายวิชาเพื่อดูเฉพาะวิชาที่สนใจ</label>
                                <select value={selectedCourseForList} onChange={(e) => setSelectedCourseForList(e.target.value)} className="w-full p-2.5 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                                    <option value="all">-- แสดงทุกรายวิชา --</option>
                                    {uniqueCourses.map(course => <option key={course.code} value={course.code}>{course.code} {course.name}</option>)}
                                </select>
                                </div>
                            </div>
                            </div>

                            {courseListDisplayData.length > 0 ? (
                            courseListDisplayData.map((courseGroup) => (
                                <div key={courseGroup.courseCode} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                <div className="bg-indigo-50/50 p-4 border-b border-indigo-100 flex justify-between items-center">
                                    <div><h3 className="text-lg font-bold text-indigo-900 flex items-center gap-2">{courseGroup.courseCode} {courseGroup.courseName}</h3></div>
                                    <span className="bg-indigo-100 text-indigo-800 py-1 px-3 rounded-full text-sm font-semibold">จำนวนนิสิตทั้งหมด {courseGroup.students.length} คน</span>
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                    <thead>
                                        <tr className="bg-slate-50 text-slate-600 text-sm">
                                        <th className="p-4 border-b w-20 text-center">ลำดับ</th>
                                        <th className="p-4 border-b">รหัสนิสิต - ชื่อ</th>
                                        <th className="p-4 border-b">สาขา</th>
                                        <th className="p-4 border-b">ภาคเรียน</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {courseGroup.students.map((student, idx) => (
                                        <tr key={idx} className="border-b last:border-0 hover:bg-slate-50 transition-colors">
                                            <td className="p-4 text-center text-slate-500">{idx + 1}</td>
                                            <td className="p-4 font-medium text-slate-800">{student.student}</td>
                                            <td className="p-4"><span className="px-2.5 py-1 bg-slate-100 text-slate-700 rounded-full text-sm">{student.major}</span></td>
                                            <td className="p-4 text-slate-600">{student.semester}</td>
                                        </tr>
                                        ))}
                                    </tbody>
                                    </table>
                                </div>
                                </div>
                            ))
                            ) : (
                            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-12 text-center text-slate-500">
                                <BookOpenIcon className="w-12 h-12 mx-auto mb-3 text-slate-300" />
                                <p>ไม่พบข้อมูลนิสิตในรายวิชาที่เลือก</p>
                            </div>
                            )}
                        </div>
                    )}

                    {activeTab === 'graph' && (
                    <div className="flex flex-col space-y-6 relative">
                        {/* แผงควบคุมด้านบน */}
                        <div className="bg-white p-5 rounded-xl shadow-sm border border-slate-200">
                            <h3 className="font-semibold mb-4 flex items-center gap-2 text-lg border-b pb-2 border-slate-100">
                                <FilterIcon className="w-5 h-5 text-indigo-600" /> แผงควบคุมและตัวกรองข้อมูล
                            </h3>
                            
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* 1. เลือกภาคเรียน */}
                                <div>
                                    <h4 className="font-medium text-slate-700 mb-3 text-sm">1. เลือกภาคเรียน</h4>
                                    <div className="flex flex-wrap gap-2">
                                        {uniqueSemesters.map(sem => (
                                            <button 
                                                key={sem} 
                                                onClick={() => setSelectedSemester(sem)} 
                                                className={`px-4 py-2 rounded-lg text-sm font-medium transition-colors border ${selectedSemester === sem ? 'bg-indigo-600 text-white border-indigo-600 shadow-sm' : 'bg-slate-50 text-slate-600 border-slate-200 hover:bg-slate-100'}`}
                                            >
                                                {sem}
                                            </button>
                                        ))}
                                    </div>
                                </div>

                                {/* 2. เลือกสาขาที่จะซ่อน */}
                                <div>
                                    <h4 className="font-medium text-slate-700 mb-3 text-sm">2. เลือกสาขาที่จะ<span className="text-red-500">ซ่อน</span>จากกราฟ</h4>
                                    <div className="space-y-2 max-h-40 overflow-y-auto pr-2">
                                        {uniqueMajors.map(major => (
                                            <label key={major} className="flex items-center gap-2 cursor-pointer group">
                                                <input 
                                                    type="checkbox" 
                                                    checked={excludedMajors.includes(major)} 
                                                    onChange={() => toggleMajorExclusion(major)} 
                                                    className="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-indigo-500" 
                                                />
                                                <span className={`text-sm ${excludedMajors.includes(major) ? 'text-slate-400 line-through' : 'text-slate-700 group-hover:text-indigo-600'}`}>{major}</span>
                                            </label>
                                        ))}
                                    </div>
                                </div>

                                {/* 3. จัดการรายวิชา */}
                                <div>
                                    <h4 className="font-medium text-slate-700 mb-3 text-sm">3. จัดการรายวิชาในกราฟ</h4>
                                    
                                    {/* Input ค้นหาเพื่อซ่อน */}
                                    <div className="relative mb-3">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <SearchIcon className="h-4 w-4 text-slate-400" />
                                        </div>
                                        <input 
                                            type="text" 
                                            value={excludeInput} 
                                            onChange={handleExcludeInputChange} 
                                            placeholder="พิมพ์ชื่อ/รหัสวิชา เพื่อซ่อน..." 
                                            className="w-full pl-9 pr-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                                        />
                                        
                                        {excludeSuggestions.length > 0 && (
                                            <ul className="absolute z-20 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg max-h-48 overflow-y-auto">
                                                {excludeSuggestions.map(c => (
                                                    <li key={c.code} onClick={() => confirmExcludeCourse(c.code)} className="px-3 py-2 text-sm hover:bg-red-50 cursor-pointer flex justify-between items-center group">
                                                        <span className="truncate">{c.code} {c.name}</span>
                                                        <span className="text-xs text-red-500 opacity-0 group-hover:opacity-100 font-medium bg-red-100 px-2 py-0.5 rounded">ซ่อน</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        )}
                                    </div>

                                    {/* Input ค้นหาเพื่อแสดงกลับ */}
                                    <div className="relative mb-4">
                                         <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                            <SearchIcon className="h-4 w-4 text-slate-400" />
                                        </div>
                                        <input 
                                            type="text" 
                                            value={includeInput} 
                                            onChange={handleIncludeInputChange} 
                                            placeholder="พิมพ์ชื่อ/รหัสวิชา เพื่อแสดงกลับ..." 
                                            className="w-full pl-9 pr-3 py-2 border border-slate-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                                        />
                                        
                                        {includeSuggestions.length > 0 && (
                                            <ul className="absolute z-20 w-full mt-1 bg-white border border-slate-200 rounded-lg shadow-lg max-h-48 overflow-y-auto">
                                                {includeSuggestions.map(c => (
                                                    <li key={c.code} onClick={() => confirmIncludeCourse(c.code)} className="px-3 py-2 text-sm hover:bg-green-50 cursor-pointer flex justify-between items-center group">
                                                        <span className="truncate">{c.code} {c.name}</span>
                                                        <span className="text-xs text-green-600 opacity-0 group-hover:opacity-100 font-medium bg-green-100 px-2 py-0.5 rounded">แสดง</span>
                                                    </li>
                                                ))}
                                            </ul>
                                        )}
                                    </div>

                                    {/* รายชื่อวิชาที่ถูกซ่อน */}
                                    {excludedGraphCourses.length > 0 && (
                                        <div className="mt-2">
                                            <p className="text-xs font-semibold text-slate-500 mb-2">วิชาที่ถูกซ่อนอยู่ ({excludedGraphCourses.length})</p>
                                            <div className="flex flex-wrap gap-1.5">
                                                {excludedGraphCourses.map(code => {
                                                    const cInfo = uniqueCourses.find(c => c.code === code);
                                                    return (
                                                        <span key={code} className="inline-flex items-center gap-1 bg-slate-100 text-slate-600 text-xs px-2 py-1 rounded border border-slate-200 hover:bg-slate-200 transition-colors">
                                                            <span className="truncate max-w-[120px]" title={cInfo ? cInfo.name : ''}>{code}</span>
                                                            <button onClick={() => confirmIncludeCourse(code)} className="text-slate-400 hover:text-red-600 focus:outline-none ml-1" title="นำกลับมาแสดง">
                                                                <svg className="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                                                            </button>
                                                        </span>
                                                    );
                                                })}
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>

                        {/* พื้นที่แสดงกราฟ */}
                        <div className={`relative bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden transition-all duration-300 ${isFullscreen ? 'fixed inset-0 z-50 h-screen w-screen rounded-none border-none' : 'h-[600px]'}`}>
                            
                            {/* ปุ่ม Fullscreen */}
                            <button 
                                onClick={() => setIsFullscreen(!isFullscreen)} 
                                className="absolute top-4 right-4 z-10 bg-white p-2.5 rounded-lg shadow-md hover:bg-slate-50 border border-slate-200 text-slate-600 transition-colors focus:outline-none focus:ring-2 focus:ring-indigo-500" 
                                title={isFullscreen ? "ย่อหน้าต่าง" : "ขยายเต็มจอ"}
                            >
                                {isFullscreen ? <MinimizeIcon className="w-5 h-5" /> : <MaximizeIcon className="w-5 h-5" />}
                            </button>

                            {/* Legend (คำอธิบายสัญลักษณ์) */}
                            <div className="absolute top-4 left-4 z-10 bg-white/95 p-4 rounded-lg shadow-md border border-slate-200 text-sm backdrop-blur-sm pointer-events-none">
                                <h4 className="font-bold text-slate-800 mb-3 text-xs uppercase tracking-wider">คำอธิบายสัญลักษณ์</h4>
                                <div className="space-y-2.5">
                                    <div className="flex items-center gap-3">
                                        <div className="w-5 h-5 bg-[#e0f2fe] border-2 border-[#0284c7] rounded flex items-center justify-center text-[8px] font-bold text-[#0284c7]">วิชา</div>
                                        <span className="text-slate-600 text-xs font-medium">รายวิชา (Node)</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="w-5 h-1 bg-[#ef4444] rounded-full"></div>
                                        <span className="text-slate-600 text-xs">สาขาคณิตศาสตร์ ลงเรียนคู่กัน</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="w-5 h-1 bg-[#ec4899] rounded-full"></div>
                                        <span className="text-slate-600 text-xs">สาขาสถิติ ลงเรียนคู่กัน</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="w-5 h-1 bg-[#10b981] rounded-full"></div>
                                        <span className="text-slate-600 text-xs">สาขาวิทยาการคอมพิวเตอร์</span>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="w-5 h-1 bg-[#94a3b8] rounded-full"></div>
                                        <span className="text-slate-600 text-xs">สาขาอื่นๆ</span>
                                    </div>
                                </div>
                                <div className="mt-3 pt-3 border-t border-slate-200 text-[10px] text-slate-500 leading-tight">
                                    * ตัวเลขบนเส้น และความหนาของเส้น<br/>บ่งบอกถึงจำนวนนิสิตที่ลงเรียนคู่กัน
                                </div>
                            </div>

                            {/* Container สำหรับ rendering vis.js */}
                            <div ref={graphRef} className="w-full h-full bg-slate-50/30 cursor-grab active:cursor-grabbing"></div>
                        </div>
                    </div>
                    )}
                </main>
            </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
